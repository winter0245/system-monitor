<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NAS Monitor</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg-primary: #1a1a2e;
  --bg-secondary: #16213e;
  --bg-card: #1e2a45;
  --bg-card-hover: #253352;
  --text-primary: #e0e0e0;
  --text-secondary: #8892a4;
  --accent-green: #4caf50;
  --accent-blue: #2196f3;
  --accent-orange: #ff9800;
  --accent-red: #f44336;
  --accent-purple: #9c27b0;
  --accent-cyan: #00bcd4;
  --border-color: #2a3a5e;
  --tab-active: #2196f3;
  --header-height: 46px;
}
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  min-height: 100vh;
}
.header {
  background: var(--bg-secondary);
  padding: 12px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--border-color);
  position: sticky;
  top: 0;
  z-index: 100;
  height: var(--header-height);
}
.header-title { font-size: 18px; font-weight: 600; color: var(--accent-cyan); }
.header-status { display: flex; gap: 16px; font-size: 12px; color: var(--text-secondary); }
.status-item { display: flex; align-items: center; gap: 4px; }
.status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent-green); animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
.tab-bar {
  display: flex;
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border-color);
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  position: sticky;
  top: var(--header-height);
  z-index: 99;
  /* 隐藏滚动条 */
  scrollbar-width: none;
  -ms-overflow-style: none;
}
.tab-bar::-webkit-scrollbar { display: none; }
.tab-item {
  padding: 12px 20px;
  font-size: 14px;
  color: var(--text-secondary);
  cursor: pointer;
  white-space: nowrap;
  border-bottom: 2px solid transparent;
  transition: all 0.3s;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  gap: 6px;
}
.tab-item .tab-icon { font-size: 16px; line-height: 1; }
.tab-item .tab-label { font-size: 14px; }
.tab-item.active { color: var(--tab-active); border-bottom-color: var(--tab-active); }
.tab-item:hover { color: var(--text-primary); }

/* 移动端 tab 栏: 居中当前 tab，其他只显示图标 */
@media(max-width:600px){
  .tab-bar {
    justify-content: center;
    overflow-x: auto;
    padding: 0 8px;
  }
  .tab-item {
    padding: 10px 14px;
    border-bottom-width: 3px;
  }
  .tab-item .tab-label { display: none; }
  .tab-item .tab-icon { font-size: 20px; }
  .tab-item.active .tab-label { display: inline; }
  .tab-item.active .tab-icon { font-size: 16px; }
  .tab-item.active { padding: 10px 16px; }
}
.tab-content { display: none; padding: 16px; max-width: 1400px; margin: 0 auto; }
.tab-content.active { display: block; }
/* 移动端滑动容器 */
.tab-pages-wrapper { overflow: hidden; }
.tab-pages-inner { display: block; }
/* 移动端 tab 内容滑动切换 */
@media(max-width:768px){
  .tab-pages-wrapper {
    overflow: hidden;
    position: relative;
  }
  .tab-pages-inner {
    display: flex;
    will-change: transform;
    transition: none;
  }
  .tab-pages-inner.snapping {
    transition: transform 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  }
  .tab-content {
    display: block !important;
    flex-shrink: 0;
    width: 100%;
    padding: 16px;
    max-width: none;
    margin: 0;
    min-height: 300px;
  }
  .tab-content.active { animation: none; }
}
.monitor-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 12px; margin-bottom: 16px; }
@media(min-width:768px){ .monitor-grid{grid-template-columns:repeat(4,1fr);} }
.stat-card {
  background: var(--bg-card);
  border-radius: 12px;
  padding: 16px;
  border: 1px solid var(--border-color);
}
.stat-card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.stat-card-title { font-size: 12px; color: var(--text-secondary); text-transform: uppercase; }
.stat-card-icon { font-size: 18px; }
.stat-card-value { font-size: 26px; font-weight: 700; margin-bottom: 4px; }
.stat-card-sub { font-size: 11px; color: var(--text-secondary); }
.chart-area {
  background: var(--bg-card);
  border-radius: 12px;
  padding: 16px;
  border: 1px solid var(--border-color);
  margin-bottom: 16px;
}
.chart-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.chart-title { font-size: 14px; font-weight: 600; }
.chart-legend { display: flex; gap: 12px; font-size: 12px; }
.legend-item { display: flex; align-items: center; gap: 4px; }
.legend-dot { width: 10px; height: 10px; border-radius: 2px; }
.chart-canvas { width: 100%; height: 150px; }
.chart-canvas svg { width: 100%; height: 100%; }
.disk-list { display: grid; gap: 8px; }
.disk-item { background: var(--bg-card); border-radius: 8px; padding: 12px 16px; border: 1px solid var(--border-color); }
.disk-item-header { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 13px; }
.disk-bar { height: 6px; background: var(--border-color); border-radius: 3px; overflow: hidden; }
.disk-bar-fill { height: 100%; border-radius: 3px; transition: width 0.5s; }
/* Torrent Tab */
.torrent-sub-tabs { display: flex; gap: 8px; margin-bottom: 16px; }
.torrent-sub-tab {
  padding: 10px 20px; border-radius: 8px; font-size: 14px; font-weight: 500;
  cursor: pointer; background: var(--bg-card); color: var(--text-secondary);
  border: 1px solid var(--border-color); transition: all 0.2s; display: flex; align-items: center; gap: 8px;
}
.torrent-sub-tab.active { background: var(--bg-card-hover); color: var(--text-primary); border-color: var(--accent-blue); }
.sub-tab-badge { background: var(--border-color); padding: 1px 7px; border-radius: 10px; font-size: 11px; }
.torrent-sub-tab.active .sub-tab-badge { background: var(--accent-blue); color: white; }
.client-panel { display: none; }
.client-panel.active { display: block; }
.speed-bar {
  display: flex; flex-wrap: wrap; gap: 8px 16px; margin-bottom: 12px; padding: 10px 16px;
  background: var(--bg-card); border-radius: 8px; border: 1px solid var(--border-color); font-size: 13px;
}
.speed-item { display: flex; align-items: center; gap: 6px; }
.speed-down { color: var(--accent-green); }
.speed-up { color: var(--accent-blue); }
.torrent-toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; flex-wrap: wrap; gap: 8px; }
.torrent-search { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 8px; padding: 8px 12px; color: var(--text-primary); font-size: 13px; width: 200px; outline: none; }
.torrent-search:focus { border-color: var(--accent-blue); }
.torrent-controls { display: flex; gap: 8px; }
.btn { padding: 8px 16px; border-radius: 6px; border: none; font-size: 12px; font-weight: 500; cursor: pointer; transition: all 0.2s; }
.btn-primary { background: var(--accent-blue); color: white; }
.btn-warning { background: var(--accent-orange); color: white; }
.btn-success { background: var(--accent-green); color: white; }
.btn-danger { background: var(--accent-red); color: white; }
.torrent-list { display: grid; gap: 8px; }
.torrent-card { background: var(--bg-card); border-radius: 8px; padding: 12px 16px; border: 1px solid var(--border-color); }
.torrent-card:hover { background: var(--bg-card-hover); }
.torrent-name { font-size: 14px; font-weight: 500; margin-bottom: 8px; word-break: break-all; line-height: 1.4; }
.torrent-meta { display: grid; grid-template-columns: repeat(2,1fr); gap: 4px 12px; font-size: 12px; color: var(--text-secondary); margin-bottom: 8px; }
.torrent-progress { height: 4px; background: var(--border-color); border-radius: 2px; overflow: hidden; margin-bottom: 8px; }
.torrent-progress-fill { height: 100%; border-radius: 2px; }
.torrent-tags { display: flex; gap: 6px; flex-wrap: wrap; }
.tag { padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 500; }
.tag-downloading { background: #1b5e20; color: #81c784; }
.tag-seeding { background: #0d47a1; color: #64b5f6; }
.tag-paused { background: #4a4a4a; color: #bbb; }
.tag-error { background: #b71c1c; color: #ef9a9a; }
.tag-checking { background: #4a148c; color: #ce93d8; }
/* Movie Tab */
.movie-section { margin-bottom: 24px; }
.section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.section-title { font-size: 16px; font-weight: 600; }
.movie-scroll { display: flex; gap: 12px; overflow-x: auto; padding-bottom: 8px; -webkit-overflow-scrolling: touch; }
.movie-card { flex-shrink: 0; width: 130px; }
.movie-poster {
  width: 130px; height: 190px; border-radius: 8px; background: var(--bg-card); border: 1px solid var(--border-color);
  display: flex; align-items: center; justify-content: center; font-size: 40px; margin-bottom: 8px;
  position: relative; overflow: hidden;
}
.movie-poster img { width: 100%; height: 100%; object-fit: cover; }
.movie-rating { position: absolute; top: 6px; right: 6px; background: rgba(0,0,0,0.8); padding: 2px 6px; border-radius: 4px; font-size: 11px; color: var(--accent-orange); font-weight: 600; }
.movie-title { font-size: 12px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.movie-year { font-size: 11px; color: var(--text-secondary); }
/* News Tab */
.news-tabs { display: flex; gap: 8px; margin-bottom: 16px; overflow-x: auto; padding-bottom: 4px; }
.news-tab { padding: 6px 14px; border-radius: 16px; font-size: 12px; cursor: pointer; white-space: nowrap; background: var(--bg-card); color: var(--text-secondary); border: 1px solid var(--border-color); }
.news-tab.active { background: var(--accent-blue); color: white; border-color: var(--accent-blue); }
.news-list { display: grid; gap: 10px; }
.news-item { background: var(--bg-card); border-radius: 8px; padding: 12px 16px; border: 1px solid var(--border-color); cursor: pointer; }
.news-item:hover { background: var(--bg-card-hover); }
.news-item-title { font-size: 14px; font-weight: 500; margin-bottom: 6px; line-height: 1.4; }
.news-item-meta { font-size: 11px; color: var(--text-secondary); display: flex; gap: 8px; }
.news-source-tag { padding: 1px 6px; background: var(--bg-secondary); border-radius: 3px; font-size: 10px; }
/* Modal */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 1000; align-items: center; justify-content: center; }
.modal-overlay.show { display: flex; }
.modal { background: var(--bg-card); border-radius: 12px; padding: 24px; width: 90%; max-width: 400px; border: 1px solid var(--border-color); }
.modal-title { font-size: 16px; font-weight: 600; margin-bottom: 16px; }
.form-group { margin-bottom: 12px; }
.form-label { font-size: 12px; color: var(--text-secondary); margin-bottom: 4px; display: block; }
.form-input { width: 100%; padding: 8px 12px; background: var(--bg-secondary); border: 1px solid var(--border-color); border-radius: 6px; color: var(--text-primary); font-size: 14px; outline: none; }
.form-input:focus { border-color: var(--accent-blue); }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }
.loading { text-align: center; padding: 40px; color: var(--text-secondary); }
@media(min-width:1024px){
  .tab-content{padding:24px;}
  .torrent-name{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;word-break:normal;}
  .torrent-meta{display:flex;grid-template-columns:none;gap:12px;}
  .news-list{grid-template-columns:repeat(2,1fr);}
  .movie-card{width:150px;} .movie-poster{width:150px;height:220px;}
}
@media(max-width:600px){
  .torrent-toolbar{flex-direction:column;align-items:stretch;}
  .torrent-search{width:100%;}
  .torrent-controls{justify-content:space-between;}
}
::-webkit-scrollbar{width:6px;height:6px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border-color);border-radius:3px;}
/* PT Tab */
.pt-toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:8px;}
.pt-site-grid{display:grid;grid-template-columns:repeat(1,1fr);gap:12px;margin-bottom:16px;}
@media(min-width:768px){.pt-site-grid{grid-template-columns:repeat(2,1fr);}}
@media(min-width:1200px){.pt-site-grid{grid-template-columns:repeat(3,1fr);}}
.pt-site-card{background:var(--bg-card);border-radius:12px;padding:16px;border:1px solid var(--border-color);transition:all 0.2s;}
.pt-site-card:hover{border-color:var(--accent-blue);transform:translateY(-2px);}
.pt-site-card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;}
.pt-site-info{display:flex;align-items:center;gap:10px;}
.pt-site-avatar{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;flex-shrink:0;}
.pt-site-name{font-size:15px;font-weight:600;}
.pt-site-url{font-size:11px;color:var(--text-secondary);max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.pt-status-badge{display:flex;align-items:center;gap:4px;padding:3px 8px;border-radius:12px;font-size:11px;font-weight:500;}
.pt-status-badge.online{background:#1b5e20;color:#81c784;}
.pt-status-badge.offline{background:#b71c1c;color:#ef9a9a;}
.pt-status-badge.unknown{background:#4a4a4a;color:#bbb;}
.pt-status-dot{width:6px;height:6px;border-radius:50%;}
.pt-status-badge.online .pt-status-dot{background:#81c784;}
.pt-status-badge.offline .pt-status-dot{background:#ef9a9a;}
.pt-last-visit{font-size:10px;color:var(--text-secondary);line-height:1.4;}
.pt-site-stats{display:grid;grid-template-columns:repeat(2,1fr);gap:6px;margin-bottom:12px;}
.pt-stat-item{background:var(--bg-secondary);border-radius:8px;padding:8px 10px;}
.pt-stat-label{font-size:10px;color:var(--text-secondary);margin-bottom:2px;text-transform:uppercase;letter-spacing:.3px;}
.pt-stat-value{font-size:22px;font-weight:700;}
.pt-stat-change{font-size:10px;}
.pt-stat-change.up{color:var(--accent-green);}
.pt-stat-change.down{color:var(--accent-red);}
.pt-site-actions{display:flex;gap:8px;flex-wrap:wrap;}
.btn-sm{padding:6px 12px;border-radius:6px;border:none;font-size:12px;font-weight:500;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;gap:4px;flex:1;justify-content:center;}
.btn-visit{background:var(--accent-blue);color:white;}
.btn-visit:hover{background:#1976d2;}
.btn-refresh{background:var(--bg-card-hover);color:var(--text-primary);border:1px solid var(--border-color);}
.btn-edit{background:var(--bg-card-hover);color:var(--text-secondary);border:1px solid var(--border-color);}
.pt-log-section{background:var(--bg-card);border-radius:12px;padding:16px;border:1px solid var(--border-color);}
.pt-log-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.pt-log-title{font-size:14px;font-weight:600;}
.pt-log-success{color:#81c784;}
.pt-log-fail{color:#ef9a9a;}
/* 日志卡片列表 */
.pt-log-cards{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;}
.pt-log-card{background:var(--bg-secondary);border-radius:10px;padding:12px 14px;border:1px solid var(--border-color);transition:background 0.2s;}
.pt-log-card:hover{background:var(--bg-card-hover);}
.pt-log-card.success{border-color:rgba(76,175,80,0.25);}
.pt-log-card.fail{border-color:rgba(244,67,54,0.25);}
.pt-log-card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.pt-log-card-site{font-size:14px;font-weight:600;color:var(--text-primary);}
.pt-log-card-result{font-size:12px;font-weight:500;padding:2px 8px;border-radius:10px;}
.pt-log-card.success .pt-log-card-result{background:#1b5e20;color:#81c784;}
.pt-log-card.fail .pt-log-card-result{background:#b71c1c;color:#ef9a9a;}
.pt-log-card-body{display:flex;flex-direction:column;gap:4px;}
.pt-log-card-time{font-size:12px;color:var(--text-secondary);display:flex;align-items:center;gap:4px;}
.pt-log-card-detail{font-size:12px;color:var(--accent-cyan);line-height:1.4;word-break:break-all;}
@media(max-width:768px){
  .pt-log-cards{grid-template-columns:1fr;}
}
@media(max-width:600px){
  .pt-log-section{padding:12px 10px;}
  .pt-log-card{padding:10px 12px;border-radius:8px;}
  .pt-log-card-site{font-size:13px;}
  .pt-log-card-detail{font-size:11px;}
}
/* 日志站点快捷筛选 */
.pt-log-filter{display:flex;gap:6px;margin-bottom:12px;overflow-x:auto;padding-bottom:2px;-webkit-overflow-scrolling:touch;scrollbar-width:none;-ms-overflow-style:none;}
.pt-log-filter::-webkit-scrollbar{display:none;}
.pt-log-filter-tab{padding:4px 10px;border-radius:12px;font-size:11px;cursor:pointer;white-space:nowrap;background:var(--bg-secondary);color:var(--text-secondary);border:1px solid transparent;transition:all 0.2s;flex-shrink:0;}
.pt-log-filter-tab:hover{color:var(--text-primary);border-color:var(--border-color);}
.pt-log-filter-tab.active{background:var(--accent-blue);color:white;border-color:var(--accent-blue);}
.pt-schedule-tag{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:500;background:#1a237e;color:#9fa8da;}
.pt-empty{text-align:center;padding:40px;color:var(--text-secondary);}
.pt-empty-icon{font-size:48px;margin-bottom:12px;}
textarea.form-input{resize:vertical;min-height:80px;font-family:monospace;font-size:12px;}
@media(max-width:500px){.pt-site-stats{grid-template-columns:1fr;}}
/* 移动端 PT 卡片紧凑化 */
@media(max-width:600px){
  .pt-site-card{padding:10px 12px;border-radius:10px;}
  .pt-site-card-header{margin-bottom:8px;}
  .pt-site-avatar{width:32px;height:32px;border-radius:8px;font-size:14px;}
  .pt-site-name{font-size:13px;}
  .pt-site-url{max-width:120px;font-size:10px;}
  .pt-site-stats{grid-template-columns:repeat(3,1fr);gap:4px;margin-bottom:8px;}
  .pt-stat-item{padding:6px 8px;border-radius:6px;}
  .pt-stat-label{font-size:9px;margin-bottom:1px;}
  .pt-stat-value{font-size:15px;}
  .pt-stat-change{font-size:9px;}
  .pt-site-actions{gap:4px;}
  .btn-sm{padding:5px 8px;font-size:11px;border-radius:5px;}
  .pt-status-badge{font-size:10px;padding:2px 6px;}
  .pt-last-visit{font-size:9px;}
  .pt-schedule-tag{font-size:9px;padding:1px 6px;}
}
</style>
</head>
<body>
<header class="header">
  <div class="header-title">NAS Monitor</div>
  <div class="header-status">
    <div class="status-item"><span class="status-dot"></span><span id="sysOs">-</span></div>
    <div class="status-item" id="sysUptime">Uptime: -</div>
  </div>
</header>
<nav class="tab-bar" id="tabBar">
  <div class="tab-item active" onclick="switchTab(0)">
    <span class="tab-icon">📊</span>
    <span class="tab-label">系统监控</span>
  </div>
  <div class="tab-item" onclick="switchTab(1)">
    <span class="tab-icon">📥</span>
    <span class="tab-label">种子任务</span>
  </div>
  <div class="tab-item" onclick="switchTab(2)">
    <span class="tab-icon">🎬</span>
    <span class="tab-label">影视推荐</span>
  </div>
  <div class="tab-item" onclick="switchTab(3)">
    <span class="tab-icon">📰</span>
    <span class="tab-label">新闻资讯</span>
  </div>
  <div class="tab-item" onclick="switchTab(4)">
    <span class="tab-icon">📡</span>
    <span class="tab-label">PT 管理</span>
  </div>
</nav>

<!-- 移动端滑动容器 -->
<div class="tab-pages-wrapper" id="tabPagesWrapper">
<div class="tab-pages-inner" id="tabPagesInner">

<!-- Tab1: System -->
<div class="tab-content active" id="tab-system">
  <div class="monitor-grid">
    <div class="stat-card">
      <div class="stat-card-header"><span class="stat-card-title">CPU</span><span class="stat-card-icon">🖥️</span></div>
      <div class="stat-card-value" style="color:var(--accent-blue)" id="cpuVal">-%</div>
      <div class="stat-card-sub" id="cpuInfo">-</div>
    </div>
    <div class="stat-card">
      <div class="stat-card-header"><span class="stat-card-title">内存</span><span class="stat-card-icon">💾</span></div>
      <div class="stat-card-value" style="color:var(--accent-green)" id="memVal">-%</div>
      <div class="stat-card-sub" id="memInfo">-</div>
    </div>
    <div class="stat-card">

<script>
// === Utils ===
function formatBytes(bytes, decimals = 1) {
  if (bytes === 0) return '0 B/s';
  const k = 1024, sizes = ['B/s','KB/s','MB/s','GB/s'];
  const i = Math.floor(Math.log(bytes) / Math.log(k));
  return parseFloat((bytes / Math.pow(k, i)).toFixed(decimals)) + ' ' + sizes[i];
}
function formatSize(bytes) {
  if (bytes === 0) return '0 B';
  const k = 1024, sizes = ['B','KB','MB','GB','TB'];
  const i = Math.floor(Math.log(bytes) / Math.log(k));
  return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + ' ' + sizes[i];
}
function formatEta(seconds) {
  if (seconds <= 0 || seconds >= 8640000) return '∞';
  const h = Math.floor(seconds / 3600), m = Math.floor((seconds % 3600) / 60);
  return h > 0 ? `${h}h ${m}m` : `${m}min`;
}

// === Tab Switch ===
let currentTabIndex = 0;
const TAB_COUNT = 5;

function switchTab(index, animateTabBar) {
  currentTabIndex = index;
  document.querySelectorAll('.tab-item').forEach((el, i) => el.classList.toggle('active', i === index));
  document.querySelectorAll('.tab-content').forEach((el, i) => el.classList.toggle('active', i === index));
  // 移动端: 平滑过渡到目标位置
  if (window.innerWidth <= 768) {
    setPagesOffset(-index * 100, true);
  }
  // 移动端: 自动滚动 tab 栏使当前 tab 居中
  centerActiveTab();
  if (index === 1 && !torrentLoaded) loadTorrents();
  if (index === 2 && !movieLoaded) loadMovies();
  if (index === 3 && !newsLoaded) loadNews();
  if (index === 4 && !ptLoaded) loadPtSites();
}

function setPagesOffset(percent, withTransition) {
  const inner = document.getElementById('tabPagesInner');
  if (!inner) return;
  if (withTransition) {
    inner.classList.add('snapping');
  } else {
    inner.classList.remove('snapping');
  }
  inner.style.transform = `translateX(${percent}%)`;
}

function centerActiveTab() {
  const tabBar = document.getElementById('tabBar');
  const activeTab = tabBar.querySelector('.tab-item.active');
  if (!activeTab) return;
  if (window.innerWidth > 600) return;
  const barWidth = tabBar.offsetWidth;
  const tabLeft = activeTab.offsetLeft;
  const tabWidth = activeTab.offsetWidth;
  const scrollTarget = tabLeft - (barWidth / 2) + (tabWidth / 2);
  tabBar.scrollTo({ left: scrollTarget, behavior: 'smooth' });
}

// === 移动端滑动切换 Tab（触摸跟随 + snap/弹簧回弹）===
(function initSwipeGesture() {
  let startX = 0;
  let startY = 0;
  let currentOffset = 0;    // 当前的 translateX 百分比（负值表示向左偏移）
  let tracking = false;
  let swipeActive = false;

  function onTouchStart(e) {
    const target = e.target;
    // 忽略交互元素
    if (target.closest('button, input, select, textarea, a, .torrent-sub-tab, .news-tab, .movie-scroll, .btn, .btn-sm')) return;
    if (window.innerWidth > 768) return;

    const inner = document.getElementById('tabPagesInner');
    if (!inner) return;

    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
    currentOffset = currentTabIndex * -100;
    tracking = true;
    swipeActive = false;

    // 取消正在进行的 snap 动画
    inner.classList.remove('snapping');
    inner.style.transform = `translateX(${currentOffset}%)`;
  }

  function onTouchMove(e) {
    if (!tracking) return;

    const deltaX = e.touches[0].clientX - startX;
    const deltaY = e.touches[0].clientY - startY;

    // 如果垂直滑动超过水平滑动，取消本次滑动追踪
    if (!swipeActive && Math.abs(deltaY) > Math.abs(deltaX) && Math.abs(deltaY) > 10) {
      tracking = false;
      // 回到原位
      const inner = document.getElementById('tabPagesInner');
      if (inner) {
        inner.classList.add('snapping');
        inner.style.transform = `translateX(${currentOffset}%)`;
      }
      return;
    }

    if (Math.abs(deltaX) > 5) {
      swipeActive = true;
    }
    if (!swipeActive) return;

    e.preventDefault();

    const inner = document.getElementById('tabPagesInner');
    if (!inner) return;

    const wrapperWidth = inner.parentElement.offsetWidth;
    const deltaPercent = (deltaX / wrapperWidth) * 100;

    // 计算目标偏移，带橡皮筋效果
    let targetPercent = currentOffset + deltaPercent;
    // 左边界（已经是第一个 tab，不允许再往右拉太多）
    if (currentTabIndex === 0 && targetPercent > 0) {
      targetPercent = targetPercent * 0.3; // 橡皮筋
    }
    // 右边界
    if (currentTabIndex === TAB_COUNT - 1 && targetPercent < -(TAB_COUNT - 1) * 100) {
      const overscroll = targetPercent - (-(TAB_COUNT - 1) * 100);
      targetPercent = -(TAB_COUNT - 1) * 100 + overscroll * 0.3;
    }

    inner.style.transform = `translateX(${targetPercent}%)`;
  }

  function onTouchEnd(e) {
    if (!tracking) return;
    tracking = false;

    if (!swipeActive) return;

    const deltaX = e.changedTouches[0].clientX - startX;
    const inner = document.getElementById('tabPagesInner');
    if (!inner) return;

    const wrapperWidth = inner.parentElement.offsetWidth;
    const deltaPercent = (deltaX / wrapperWidth) * 100;

    // 判断 snap 方向：滑动超过 25% 宽度或者速度很快
    const threshold = 25;
    let targetIndex = currentTabIndex;

    if (deltaPercent < -threshold && currentTabIndex < TAB_COUNT - 1) {
      targetIndex = currentTabIndex + 1;
    } else if (deltaPercent > threshold && currentTabIndex > 0) {
      targetIndex = currentTabIndex - 1;
    }

    // 执行 snap
    currentTabIndex = targetIndex;
    document.querySelectorAll('.tab-item').forEach((el, i) => el.classList.toggle('active', i === targetIndex));
    document.querySelectorAll('.tab-content').forEach((el, i) => el.classList.toggle('active', i === targetIndex));

    inner.classList.add('snapping');
    inner.style.transform = `translateX(${targetIndex * -100}%)`;
    centerActiveTab();

    // 延迟加载
    if (targetIndex === 1 && !torrentLoaded) loadTorrents();
    if (targetIndex === 2 && !movieLoaded) loadMovies();
    if (targetIndex === 3 && !newsLoaded) loadNews();
    if (targetIndex === 4 && !ptLoaded) loadPtSites();
  }

  document.addEventListener('touchstart', onTouchStart, { passive: true });
  document.addEventListener('touchmove', onTouchMove, { passive: false });
  document.addEventListener('touchend', onTouchEnd, { passive: true });
})();

// === Tab1: System Monitor ===
let netHistory = [];
const MAX_POINTS = 180;

async function initSystem() {
  try {
    const resp = await fetch('/api/system/info');
    const info = await resp.json();
    document.getElementById('sysOs').textContent = info.os;
    document.getElementById('sysUptime').textContent = 'Uptime: ' + info.uptime;
    document.getElementById('cpuInfo').textContent = `${info.cpu_model} · ${info.cpu_cores}C/${info.cpu_threads}T`;
    document.getElementById('memInfo').textContent = `- / ${info.total_memory_gb} GB`;
  } catch(e) { console.error('System info error:', e); }
  connectWS();
}

function connectWS() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  const ws = new WebSocket(`${proto}//${location.host}/api/system/ws`);
  ws.onmessage = (e) => {
    const d = JSON.parse(e.data);
    document.getElementById('cpuVal').textContent = d.cpu.percent + '%';
    document.getElementById('memVal').textContent = d.memory.percent + '%';
    document.getElementById('memInfo').textContent = `${d.memory.used_gb} GB / ${d.memory.total_gb} GB`;
    document.getElementById('dlVal').textContent = formatBytes(d.network.download_speed);
    document.getElementById('ulVal').textContent = formatBytes(d.network.upload_speed);
    document.getElementById('dlInfo').textContent = '总计: ' + formatSize(d.network.bytes_recv);
    document.getElementById('ulInfo').textContent = '总计: ' + formatSize(d.network.bytes_sent);
    netHistory.push({ dl: d.network.download_speed, ul: d.network.upload_speed });
    if (netHistory.length > MAX_POINTS) netHistory.shift();
    drawNetChart();
    renderDisks(d.disks);
  };
  ws.onclose = () => setTimeout(connectWS, 3000);
  ws.onerror = () => ws.close();
}

function drawNetChart() {
  const svg = document.getElementById('netChart');
  const w = 600, h = 150;
  const pts = netHistory;
  if (pts.length < 2) return;
  const maxVal = Math.max(...pts.map(p => Math.max(p.dl, p.ul)), 1);
  const stepX = w / (MAX_POINTS - 1);

  function toPath(key) {
    return pts.map((p, i) => {
      const x = i * stepX;
      const y = h - (p[key] / maxVal) * (h - 10);
      return (i === 0 ? 'M' : 'L') + x.toFixed(1) + ',' + y.toFixed(1);
    }).join(' ');
  }
  function toArea(key) {
    const line = toPath(key);
    const lastX = ((pts.length - 1) * stepX).toFixed(1);
    return line + ` L${lastX},${h} L0,${h} Z`;
  }

  svg.innerHTML = `
    <defs>
      <linearGradient id="dlG" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="rgba(0,188,212,0.3)"/><stop offset="100%" stop-color="rgba(0,188,212,0)"/></linearGradient>
      <linearGradient id="ulG" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="rgba(255,152,0,0.2)"/><stop offset="100%" stop-color="rgba(255,152,0,0)"/></linearGradient>
    </defs>
    <path d="${toArea('dl')}" fill="url(#dlG)"/>
    <path d="${toPath('dl')}" fill="none" stroke="var(--accent-cyan)" stroke-width="1.5"/>
    <path d="${toArea('ul')}" fill="url(#ulG)"/>
    <path d="${toPath('ul')}" fill="none" stroke="var(--accent-orange)" stroke-width="1.5"/>
  `;
}

function renderDisks(disks) {
  const el = document.getElementById('diskList');
  el.innerHTML = disks.map(d => {
    const color = d.percent > 85 ? 'var(--accent-red)' : d.percent > 70 ? 'var(--accent-orange)' : 'var(--accent-green)';
    return `<div class="disk-item">
      <div class="disk-item-header"><span>${d.mountpoint}</span><span>${d.used_gb} GB / ${d.total_gb} GB</span></div>
      <div class="disk-bar"><div class="disk-bar-fill" style="width:${d.percent}%;background:${color}"></div></div>
    </div>`;
  }).join('');
}

// === Tab2: Torrents ===
let torrentLoaded = false;
let currentClient = 'qb';

async function loadTorrents() {
  torrentLoaded = true;
  const container = document.getElementById('tab-torrent');
  container.innerHTML = `
    <div class="torrent-sub-tabs">
      <div class="torrent-sub-tab active" onclick="switchClient('qb')">🟦 qBittorrent <span class="sub-tab-badge" id="qb-count">-</span></div>
      <div class="torrent-sub-tab" onclick="switchClient('tr')">🟩 Transmission <span class="sub-tab-badge" id="tr-count">-</span></div>
    </div>
    <div class="client-panel active" id="panel-qb"><div class="loading">加载中...</div></div>
    <div class="client-panel" id="panel-tr"><div class="loading">加载中...</div></div>
  `;
  await Promise.all([fetchClient('qb'), fetchClient('tr')]);
}

function switchClient(client) {
  currentClient = client;
  document.querySelectorAll('.torrent-sub-tab').forEach((t,i) => t.classList.toggle('active', (client==='qb'?0:1)===i));
  document.querySelectorAll('.client-panel').forEach((p,i) => p.classList.toggle('active', (client==='qb'?0:1)===i));
}

async function fetchClient(client) {
  try {
    const resp = await fetch(`/api/torrent/${client}/list`);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const data = await resp.json();
    document.getElementById(`${client}-count`).textContent = data.torrents.length;
    renderClientPanel(client, data);
  } catch(e) {
    document.getElementById(`${client}-count`).textContent = '-';
    document.getElementById(`panel-${client}`).innerHTML = `<div class="loading" style="color:var(--accent-red)">连接失败: ${e.message}</div>`;
  }
}

function renderClientPanel(client, data) {
  const s = data.stats;
  const sl = s.speed_limit || {};
  let limitText, limitColor;
  if (!sl.enabled) {
    const srcLabel = (sl.source && sl.source.label) || '不限速';
    limitText = `限速: 未开启 (${srcLabel})`;
    limitColor = 'var(--accent-orange)';
  } else {
    const dlKB = sl.download;
    const ulKB = sl.upload;
    const srcLabel = (sl.source && sl.source.label) || '';
    limitText = `限速: ↓${dlKB}KB/s ↑${ulKB}KB/s · ${srcLabel}`;
    limitColor = sl.source && sl.source.source === 'manual' ? 'var(--accent-red)' : 'var(--accent-blue)';
  }
  const activeCount = data.torrents.filter(t => t.download_speed > 0 || t.upload_speed > 0).length;

  let html = `
    <div class="speed-bar">
      <div class="speed-item speed-down">⬇️ ${formatBytes(s.download_speed)}</div>
      <div class="speed-item speed-up">⬆️ ${formatBytes(s.upload_speed)}</div>
      <div class="speed-item" style="color:var(--text-secondary)">活跃 ${s.active} · 做种 ${s.seeding} · 暂停 ${s.paused}</div>
      <div class="speed-item" style="color:${limitColor};margin-left:auto">${limitText}</div>
    </div>
    <div class="torrent-toolbar">
      <div style="display:flex;gap:8px;align-items:center;">
        <input type="text" class="torrent-search" placeholder="🔍 搜索种子..." oninput="filterTorrents('${client}',this.value)">
        <div class="news-tabs" style="margin-bottom:0">
          <div class="news-tab active" onclick="filterActivity('${client}','active',this)">活跃 (${activeCount})</div>
          <div class="news-tab" onclick="filterActivity('${client}','all',this)">全部 (${data.torrents.length})</div>
        </div>
      </div>
      <div class="torrent-controls">
        <button class="btn btn-warning" onclick="showModal('${client}')">⚡ 限速</button>
        <button class="btn btn-success" onclick="removeLimit('${client}')">✅ 解除</button>
        <button class="btn btn-primary" onclick="pauseAll('${client}')">⏸️ 暂停</button>
        <button class="btn btn-success" onclick="resumeAll('${client}')">▶️ 恢复</button>
      </div>
    </div>
    <div class="torrent-list" id="list-${client}">`;

  html += data.torrents.map(t => renderTorrentCard(t)).join('');
  html += '</div>';
  document.getElementById(`panel-${client}`).innerHTML = html;
  // 恢复用户之前选择的过滤状态，而非每次强制切回"活跃"
  const saved = window._torrentFilter || {};
  const mode = saved[client] || 'active';
  const tabEl = document.querySelector(`#panel-${client} .news-tab[onclick*="${mode}"]`);
  if (tabEl) {
    filterActivity(client, mode, tabEl);
  } else {
    filterActivity(client, 'active');
  }
  // 恢复搜索框文字
  const searchQuery = saved[client + '_search'] || '';
  if (searchQuery) {
    const searchInput = document.querySelector(`#panel-${client} .torrent-search`);
    if (searchInput) {
      searchInput.value = searchQuery;
      filterTorrents(client, searchQuery);
    }
  }
}

function renderTorrentCard(t) {
  const pct = Math.round(t.progress * 100);
  const stateTag = {
    downloading: `<span class="tag tag-downloading">下载中 ${pct}%</span>`,
    seeding: '<span class="tag tag-seeding">做种中</span>',
    paused: '<span class="tag tag-paused">已暂停</span>',
    error: '<span class="tag tag-error">错误</span>',
    checking: '<span class="tag tag-checking">校验中</span>',
    queued: '<span class="tag tag-paused">排队中</span>',
  }[t.state] || `<span class="tag">${t.state}</span>`;
  const progressBg = t.state === 'seeding' ? 'var(--accent-blue)' : 'linear-gradient(90deg,var(--accent-green),var(--accent-cyan))';
  const etaStr = t.state === 'downloading' ? `<span>⏱️ ${formatEta(t.eta)}</span>` : `<span>比率 ${t.ratio}</span>`;

  const isActive = (t.download_speed > 0 || t.upload_speed > 0) ? '1' : '0';
  return `<div class="torrent-card" data-name="${t.name.toLowerCase()}" data-active="${isActive}">
    <div class="torrent-name">${t.name}</div>
    <div class="torrent-meta">
      <span>📦 ${formatSize(t.size)}</span>
      <span>⬇️ ${formatBytes(t.download_speed)}</span>
      <span>⬆️ ${formatBytes(t.upload_speed)}</span>
      <span>👥 ${t.seeds} / ${t.peers}</span>
      ${etaStr}
    </div>
    <div class="torrent-progress"><div class="torrent-progress-fill" style="width:${pct}%;background:${progressBg}"></div></div>
    <div class="torrent-tags">${stateTag}${t.category ? `<span class="tag" style="background:#1a237e;color:#90caf9">${t.category}</span>` : ''}${(t.tags && t.tags.trim()) ? t.tags.split(',').map(tag => `<span class="tag" style="background:#263238;color:#b0bec5">${tag.trim()}</span>`).join('') : ''}</div>
  </div>`;
}

function filterTorrents(client, query) {
  // 记住搜索词
  if (!window._torrentFilter) window._torrentFilter = {};
  window._torrentFilter[client + '_search'] = query;
  const q = query.toLowerCase();
  document.querySelectorAll(`#list-${client} .torrent-card`).forEach(card => {
    card.style.display = card.dataset.name.includes(q) ? '' : 'none';
  });
}

function filterActivity(client, mode, el) {
  // 记住用户选择，下次刷新时恢复
  if (!window._torrentFilter) window._torrentFilter = {};
  window._torrentFilter[client] = mode;
  if (el) {
    el.parentElement.querySelectorAll('.news-tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
  }
  document.querySelectorAll(`#list-${client} .torrent-card`).forEach(card => {
    if (mode === 'active') {
      card.style.display = card.dataset.active === '1' ? '' : 'none';
    } else {
      card.style.display = '';
    }
  });
}

// === Torrent Controls ===
let modalClient = 'qb';
function showModal(client) { modalClient = client; document.getElementById('modalClient').textContent = client === 'qb' ? 'qBittorrent' : 'Transmission'; document.getElementById('speedModal').classList.add('show'); }
function hideModal() { document.getElementById('speedModal').classList.remove('show'); }
async function applySpeedLimit() {
  const dl = parseInt(document.getElementById('modalDl').value) || 0;
  const ul = parseInt(document.getElementById('modalUl').value) || 0;
  const duration = parseInt(document.getElementById('modalDuration').value) || 0;
  await fetch(`/api/torrent/${modalClient}/speed-limit`, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({download:dl,upload:ul,duration:duration}) });
  hideModal(); fetchClient(modalClient);
}
async function removeLimit(client) { await fetch(`/api/torrent/${client}/speed-limit/remove`,{method:'POST'}); fetchClient(client); }
async function pauseAll(client) { await fetch(`/api/torrent/${client}/pause-all`,{method:'POST'}); setTimeout(()=>fetchClient(client),1000); }
async function resumeAll(client) { await fetch(`/api/torrent/${client}/resume-all`,{method:'POST'}); setTimeout(()=>fetchClient(client),1000); }

// === Tab3: Movies ===
let movieLoaded = false;
async function loadMovies() {
  movieLoaded = true;
  const container = document.getElementById('tab-movie');
  container.innerHTML = '<div class="loading">加载中...</div>';
  try {
    const [trending, topRated, dbMovie, dbTv] = await Promise.all([
      fetch('/api/movies/trending').then(r=>r.json()),
      fetch('/api/movies/top-rated').then(r=>r.json()),
      fetch('/api/movies/douban/movie-hot').then(r=>r.json()).catch(()=>[]),

function timeAgo(ts) {
  if (!ts) return '';
  const diff = Math.floor(Date.now()/1000 - ts);
  if (diff < 3600) return Math.floor(diff/60) + '分钟前';
  if (diff < 86400) return Math.floor(diff/3600) + '小时前';
  return Math.floor(diff/86400) + '天前';
}

function formatLogTime(dateStr) {
  // dateStr 格式: "2026-06-15 01:23" 或 ISO 格式
  const d = new Date(dateStr.replace(' ','T') + (dateStr.includes('+')?'':'+08:00'));
  if (isNaN(d.getTime())) return dateStr.substring(0,16).replace('T',' ');
  const weekDays = ['周日','周一','周二','周三','周四','周五','周六'];
  const day = weekDays[d.getDay()];
  const month = d.getMonth() + 1;
  const date = d.getDate();
  const hours = String(d.getHours()).padStart(2,'0');
  const mins = String(d.getMinutes()).padStart(2,'0');
  return `${month}/${date} ${day} ${hours}:${mins}`;
}

      <div class="pt-empty-text">暂无 PT 站点配置</div>
      <button class="btn btn-primary" onclick="showPtSiteForm()">＋ 添加第一个 PT 站点</button>
    </div>`;
  }

  // 操作记录 — 卡片式布局
  // 提取所有有日志的站点作为快捷筛选
  const logSiteIds = [...new Set((window._ptSites || []).map(s => s.id))];

    const activeFilter = window._ptLogSite || 'all';

      <div class="pt-log-filter-tab${activeFilter==='all'?' active':''}" onclick="filterPtLogSite('all')">全部</div>

        <div class="news-tab${current==='redirect'?' active':''}" onclick="switchPtLogTab('redirect')">🔗 链接跳转</div>

      <div class="pt-empty" style="padding:20px;grid-column:1/-1;">加载中...</div>

  window._ptLogTab = type;

async function loadPtLogs(type) {
  const container = document.getElementById('ptLogCards');
  if (!container) return;
  container.innerHTML = '<div class="pt-empty" style="padding:20px;grid-column:1/-1;">加载中...</div>';
  try {
    const resp = await fetch(`/api/pt/logs?limit=50`);
    const data = await resp.json();
    let logs = data.logs || [];
    if (type === 'playwright') {
      logs = logs.filter(l => l.visit_type === 'scheduled' || l.visit_type === 'manual');
    } else {
      logs = logs.filter(l => l.visit_type === 'redirect');
    }
    const sites = window._ptSites || [];
    if (logs.length === 0) {
      container.innerHTML = '<div class="pt-empty" style="padding:20px;grid-column:1/-1;">暂无记录</div>';
      return;
    }
    container.innerHTML = logs.map(log => {
      const siteName = sites.find(s => s.id === log.site_id)?.name || log.site_id;
      const isSuccess = log.success;
      const dateStr = log.created_at ? formatLogTime(log.created_at) : '';
      const detailText = log.details || log.message || '';
      const visitLabel = log.visit_type === 'scheduled' ? '定时' : log.visit_type === 'manual' ? '手动' : '跳转';
      return `<div class="pt-log-card ${isSuccess ? 'success' : 'fail'}" data-site="${log.site_id}">
        <div class="pt-log-card-header">
          <span class="pt-log-card-site">${siteName}</span>
          <span class="pt-log-card-result">${isSuccess ? '✓ 成功' : '✗ 失败'} · ${visitLabel}</span>
        </div>
        <div class="pt-log-card-body">
          <div class="pt-log-card-time">🕐 ${dateStr}</div>
          ${detailText ? `<div class="pt-log-card-detail">${detailText}</div>` : ''}
        </div>
      </div>`;
    }).join('');
    // 应用当前站点筛选
    const activeSite = window._ptLogSite || 'all';
    if (activeSite !== 'all') {
      document.querySelectorAll('.pt-log-card').forEach(card => {
        card.style.display = card.dataset.site === activeSite ? '' : 'none';
      });
    }
  } catch(e) {
    container.innerHTML = '<div class="pt-empty" style="padding:20px;grid-column:1/-1;color:var(--accent-red)">加载失败</div>';
  }
}

function renderPtSiteCard(site, sched) {
  const snap = site.latest_snapshot;
  const delta = site.today_delta || {};
  const hasData = !!snap;

  // 状态
  let statusClass = 'unknown', statusText = '未访问';
  if (site.last_success_time) {
    // 检查最后一次成功是否在48小时内
    const lastTs = new Date(site.last_success_time).getTime();
    const hoursSince = (Date.now() - lastTs) / 3600000;
    if (hoursSince < 48) { statusClass = 'online'; statusText = '正常'; }
    else { statusClass = 'offline'; statusText = '超时未更新'; }
  }

  // 链接跳转天数
  let redirectDaysAgo = '';
  if (site.last_redirect_time) {
    const lastTs = new Date(site.last_redirect_time.replace(' ','T') + '+08:00').getTime();
    const daysSince = Math.floor((Date.now() - lastTs) / 86400000);
    if (daysSince === 0) redirectDaysAgo = '今天';
    else if (daysSince === 1) redirectDaysAgo = '昨天';
    else redirectDaysAgo = `${daysSince}天前`;
  } else {
    redirectDaysAgo = '从未';
  }

  // Playwright 最近访问
  let playwrightAgo = '';
  if (site.last_success_time) {
    const lastTs = new Date(site.last_success_time.replace(' ','T') + '+08:00').getTime();
    const hoursSince = (Date.now() - lastTs) / 3600000;
    if (hoursSince < 1) playwrightAgo = '刚刚';
    else if (hoursSince < 24) playwrightAgo = `${Math.floor(hoursSince)}小时前`;
    else playwrightAgo = `${Math.floor(hoursSince/24)}天前`;
  } else {
    playwrightAgo = '从未';
  }

  // 头像字母
  const avatarLetter = site.name.charAt(0).toUpperCase();
  const avatarColors = ['#1565c0','#6a1b9a','#e65100','#2e7d32','#c62828','#006064','#4a148c','#b71c1c'];
  const avatarBg = avatarColors[site.name.charCodeAt(0) % avatarColors.length];
  const avatarFg = '#e0e0e0';

  // 今天实际访问时间
  const todayTimes = (sched && sched.visit_times) ? sched.visit_times.join(' · ') : `${site.visit_freq}次/天`;

  function fmtDelta(key) {
    if (!hasData || !delta || !delta[key] || delta[key] === 0) return '';
    const val = delta[key];
    const sign = val > 0 ? '+' : '';
    if (key.includes('bytes')) {
      return `<div class="pt-stat-change ${val > 0 ? 'up' : 'down'}">${sign}${formatSize(Math.abs(val))} (今日)</div>`;
    }
    return `<div class="pt-stat-change ${val > 0 ? 'up' : 'down'}">${sign}${Math.round(val).toLocaleString()} (今日)</div>`;
  }

  function fmtBytesPt(b) {
    if (!b || b === 0) return '0 B';
    return formatSize(b);
  }

  return `<div class="pt-site-card">
    <div class="pt-site-card-header">
      <div class="pt-site-info">
        <div class="pt-site-avatar" style="background:${avatarBg};color:${avatarFg};">${avatarLetter}</div>
        <div>
          <div class="pt-site-name">${site.name}</div>
          <div class="pt-site-url">${site.url.replace(/https?:\/\//,'')}</div>
          <div style="margin-top:4px"><span class="pt-schedule-tag">⏰ ${todayTimes}</span></div>
        </div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;">
        <div class="pt-status-badge ${statusClass}"><span class="pt-status-dot"></span> ${statusText}</div>
        <div class="pt-last-visit">Playwright: ${playwrightAgo}</div>
        <div class="pt-last-visit" style="color:${redirectDaysAgo.includes('天') && parseInt(redirectDaysAgo) > 7 ? 'var(--accent-red)' : 'var(--text-secondary)'}">链接跳转: ${redirectDaysAgo}</div>
      </div>
    </div>
    <div class="pt-site-stats">
      <div class="pt-stat-item">
        <div class="pt-stat-label">上传量</div>
        <div class="pt-stat-value" style="color:var(--accent-blue);">${hasData ? fmtBytesPt(snap.upload_bytes) : '--'}</div>
        ${fmtDelta('upload_bytes')}
      </div>
      <div class="pt-stat-item">
        <div class="pt-stat-label">下载量</div>
        <div class="pt-stat-value" style="color:var(--accent-orange);">${hasData ? fmtBytesPt(snap.download_bytes) : '--'}</div>
        ${fmtDelta('download_bytes')}
      </div>
      <div class="pt-stat-item">
        <div class="pt-stat-label">做种积分</div>
        <div class="pt-stat-value" style="color:var(--accent-green);">${hasData ? (snap.seed_points||0).toLocaleString() : '--'}</div>
        ${fmtDelta('seed_points')}
      </div>
      <div class="pt-stat-item">
        <div class="pt-stat-label">魔力值</div>
        <div class="pt-stat-value" style="color:var(--accent-purple);">${hasData ? (snap.bonus_points||0).toLocaleString() : '--'}</div>
        ${fmtDelta('bonus_points')}
      </div>
      <div class="pt-stat-item">
        <div class="pt-stat-label">分享率</div>
        <div class="pt-stat-value" style="color:var(--accent-cyan);">${hasData ? (snap.share_ratio||0).toFixed(2) : '--'}</div>
      </div>
      <div class="pt-stat-item">
        <div class="pt-stat-label">做种数</div>
        <div class="pt-stat-value" style="color:var(--text-primary);">${hasData ? (snap.seeding_count||0) : '--'}</div>
      </div>
    </div>
    <div class="pt-site-actions">
      <button class="btn-sm btn-visit" onclick="visitPtSite('${site.id}')">🔗 跳转站点</button>
      <button class="btn-sm btn-refresh" onclick="refreshPtSite('${site.id}')">🔄 刷新数据</button>
      <button class="btn-sm btn-edit" onclick="showPtSiteForm('${site.id}')">⚙️ 编辑</button>
    </div>
  </div>`;
}

async function visitPtSite(siteId) {
  try {
    const resp = await fetch(`/api/pt/visit-log/${siteId}`, { method:'POST' });

    const data = await resp.json();
    if (data.url) {
      window.open(data.url, '_blank');
    }
    // 刷新数据
    setTimeout(() => loadPtSites(), 500);
  } catch(e) {
    alert(`跳转失败: ${e.message}`);
  }
}

async function refreshPtSite(siteId) {
  const btn = document.querySelector(`[onclick="refreshPtSite('${siteId}')"]`);
  if (btn) { btn.textContent = '⏳ 扫描中...'; btn.disabled = true; }
  try {
    const resp = await fetch(`/api/pt/scan?site_id=${siteId}`, { method:'POST' });

}

function renderPtFormModal(site) {
  const isEdit = !!site;
  const title = isEdit ? `编辑站点: ${site.name}` : '添加 PT 站点';
  const values = site || { id:'', name:'', url:'', cookie:'', user_agent:'', visit_freq:2, visit_times:'', notes:'' };

  const saveFn = isEdit ? `savePtSite(true)` : `savePtSite(false)`;
  const deleteBtn = isEdit ? `<button class="btn btn-danger" style="margin-right:auto;" onclick="deletePtSite('${values.id}')">🗑️ 删除</button>` : '';

  // 创建一个简单的 modal
  const modalHtml = `
    <div class="modal-overlay show" id="ptFormModal">
      <div class="modal" style="max-width:500px;">
        <div class="modal-title">${title}</div>
        <div class="form-group">
          <label class="form-label">站点 ID (英文标识)</label>
          <input type="text" class="form-input" id="pt-f-id" value="${values.id}" ${isEdit?'readonly style="opacity:0.6"':''} placeholder="例如: mteam">
        </div>
        <div class="form-group">
          <label class="form-label">站点名称</label>
          <input type="text" class="form-input" id="pt-f-name" value="${values.name}" placeholder="例如: M-Team">
        </div>
        <div class="form-group">
          <label class="form-label">站点首页 URL</label>
          <input type="text" class="form-input" id="pt-f-url" value="${values.url}" placeholder="例如: https://kp.m-team.cc/">
        </div>
        <div class="form-group">
          <label class="form-label">Cookie</label>
          <textarea class="form-input" id="pt-f-cookie" placeholder="粘贴完整的 Cookie 字符串">${values.cookie||''}</textarea>
        </div>
        <div class="form-group" style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
          <div>
            <label class="form-label">每天访问频率 (1-4次)</label>
            <select class="form-input" id="pt-f-freq">
              <option value="1" ${values.visit_freq==1?'selected':''}>1 次/天 (09:00)</option>
              <option value="2" ${values.visit_freq==2?'selected':''}>2 次/天 (09:00, 21:00)</option>
              <option value="3" ${values.visit_freq==3?'selected':''}>3 次/天 (08:00, 14:00, 20:00)</option>
              <option value="4" ${values.visit_freq==4?'selected':''}>4 次/天 (06, 12, 18, 23)</option>
            </select>
          </div>
          <div>
            <label class="form-label">自定义时间 (可选)</label>
            <input type="text" class="form-input" id="pt-f-times" value="${values.visit_times||''}" placeholder="例如: 08:00,14:00,20:00">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">备注</label>
          <input type="text" class="form-input" id="pt-f-notes" value="${values.notes||''}" placeholder="备注信息">
        </div>
        <div class="modal-actions">
          ${!isEdit ? `<button class="btn btn-danger" style="margin-right:auto;" onclick="deletePtSite('${values.id}')" ${!isEdit?'style="display:none"':''}>🗑️ 删除</button>` : `<button class="btn btn-danger" style="margin-right:auto;" onclick="deletePtSite('${values.id}')">🗑️ 删除</button>`}
          <button class="btn" style="background:var(--border-color);color:var(--text-primary);" onclick="closePtForm()">取消</button>
          <button class="btn btn-primary" onclick="${saveFn}">保存</button>
        </div>
      </div>
    </div>
  `;

  // 插入 modal
  const existing = document.getElementById('ptFormModal');
  if (existing) existing.remove();
  document.body.insertAdjacentHTML('beforeend', modalHtml);
}

function closePtForm() {
  document.getElementById('ptFormModal')?.remove();
}

async function savePtSite(isEdit) {
  const id = document.getElementById('pt-f-id').value.trim();
  const name = document.getElementById('pt-f-name').value.trim();
  const url = document.getElementById('pt-f-url').value.trim();

  if (!id || !name || !url) { alert('请填写站点ID、名称和URL'); return; }

  const data = {
    id, name, url,
    cookie: document.getElementById('pt-f-cookie').value.trim(),
    visit_freq: parseInt(document.getElementById('pt-f-freq').value),
    visit_times: document.getElementById('pt-f-times').value.trim(),
    notes: document.getElementById('pt-f-notes').value.trim(),
  };

  try {
    const method = isEdit ? 'PUT' : 'POST';
    const endpoint = isEdit ? `/api/pt/sites/${id}` : '/api/pt/sites';
    const resp = await fetch(endpoint, {
      method,
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify(data),
    });
    if (!resp.ok) {
      const err = await resp.json();
      throw new Error(err.detail || `HTTP ${resp.status}`);
    }
    closePtForm();
    loadPtSites();
  } catch(e) {
    alert(`保存失败: ${e.message}`);
  }
}

async function deletePtSite(siteId) {
  if (!confirm(`确定删除站点 ${siteId} 吗？所有相关数据将被永久删除。`)) return;
  try {
    const resp = await fetch(`/api/pt/sites/${siteId}`, { method:'DELETE' });
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    closePtForm();
    loadPtSites();
  } catch(e) {
    alert(`删除失败: ${e.message}`);
  }
}

// === Init ===
initSystem();
</script>
</body>
</html>
