cache:
  movie_ttl: 21600
  news_ttl: 1800

douban:
  api_key: "0dad551ec0f84ed02907ff5c42e8ec70"
  api_secret: "bf7dddc7c9cfe6f7"

pt:
  # 每个频率等级对应的时间点列表
  # window: 随机窗口（分钟），实际执行时间在 [time - window, time + window] 内随机
  # 同一天内随机值固定，每天不同，模拟真人访问习惯
  visit_schedule:
    1:
      - time: "09:00"
        window: 45
    2:
      - time: "09:00"
        window: 45
      - time: "21:00"
        window: 45
    3:
      - time: "08:00"
        window: 40
      - time: "14:00"
        window: 40
      - time: "20:00"
        window: 40
    4:
      - time: "06:00"
        window: 30
      - time: "12:00"
        window: 30
      - time: "18:00"
        window: 30
      - time: "23:00"
        window: 30

