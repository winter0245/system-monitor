  port: 8900

qbittorrent:
  url: http://localhost:8080
  username: admin
  password: adminadmin

transmission:
  url: http://localhost:9091
  username: admin
  password: adminadmin

speed_limit:
  remove_cooldown: 180  # 解除限速后多少分钟内不参与调度（默认3小时）
  schedule:
    - name: "白天限速"
      start: "08:00"
      end: "23:00"
      download: 5120  # KB/s
      upload: 2048    # KB/s
    - name: "夜间不限"
      start: "23:00"
      end: "08:00"
      download: 0     # 0=不限
      upload: 0

